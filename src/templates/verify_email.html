<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }
        .header {
            text-align: center;
            color: #333;
        }
        .code-box {
            background-color: #f4f4f4;
            padding: 15px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #2c3e50;
            border-radius: 5px;
            margin: 20px 0;
        }
        .footer {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Tasdiqlash kodi</h2>
            <p>Ro'yxatdan o'tishni yakunlash uchun quyidagi koddan foydalaning:</p>
        </div>
        
        <div class="code-box">
            {{ code }}
        </div>
        
        <p>Ushbu kod 10 daqiqa davomida amal qiladi. Agar siz so'rov yubormagan bo'lsangiz, ushbu xabarga e'tibor bermang.</p>
        
        <div class="footer">
            © 2026 Maxfiy Platforma. Barcha huquqlar himoyalangan.
        </div>
    </div>
</body>
</html>
